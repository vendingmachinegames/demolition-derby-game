<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demolition Derby — Screen</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #3A3F47; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
      canvas#arena { display: block; }
      #join-panel {
        position: fixed; bottom: 14px; right: 14px;
        background: #2C3038; border: 3px solid #3DA9FF; border-radius: 14px;
        padding: 14px 16px 12px;
        display: flex; flex-direction: column; align-items: center; gap: 6px;
        min-width: 160px;
      }
      #join-panel .panel-label {
        color: #9AABB8; font: bold 11px Impact, "Arial Black", sans-serif;
        letter-spacing: 0.10em; text-transform: uppercase;
      }
      #room-code {
        color: #FFC83D;
        font: bold 52px Impact, "Arial Black", sans-serif;
        letter-spacing: 0.14em;
        line-height: 1;
        min-height: 56px;
      }
      #join-panel .divider {
        width: 100%; height: 2px; background: rgba(61,169,255,0.25); border-radius: 2px;
      }
      #join-panel canvas { border-radius: 6px; }
      #join-panel .url-hint {
        color: #9AABB8; font: 10px "Arial Black", Impact, sans-serif;
        letter-spacing: 0.04em; text-align: center;
      }
      #status { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); color: #FFC83D; font: bold 14px Impact, "Arial Black", sans-serif; }
    </style>
  </head>
  <body>
    <canvas id="arena" width="800" height="600"></canvas>
    <div id="join-panel">
      <div class="panel-label">room code</div>
      <div id="room-code">····</div>
      <div class="divider"></div>
      <canvas id="qr"></canvas>
      <div class="url-hint" id="join-url">scan or visit /controller</div>
    </div>
    <div id="status">Connecting…</div>
    <script type="module" src="/src/screen.ts"></script>
  </body>
</html>
