<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Demolition Derby — Controller</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; overflow: hidden; touch-action: none; }
      body {
        background: #3A3F47;
        display: flex; flex-direction: column; align-items: center;
        justify-content: space-between; padding: 24px 16px 40px;
        font-family: Impact, "Arial Black", sans-serif;
        color: #FFF4E0;
        user-select: none;
      }
      #status { font-size: 14px; color: #9AABB8; min-height: 20px; letter-spacing: 0.05em; }
      #round-info { font-size: 18px; color: #FFF4E0; min-height: 22px; text-align: center; letter-spacing: 0.05em; }
      #hp-wrap {
        width: min(90vw, 360px);
        display: flex; flex-direction: column; gap: 4px;
      }
      #hp-bar {
        width: 100%; height: 16px; background: rgba(0,0,0,0.35); border-radius: 4px; overflow: hidden;
        border: 2px solid #3DA9FF;
      }
      #hp-fill {
        height: 100%; width: 100%; background: #7BD63A;
        transition: width 0.1s, background 0.2s;
        border-radius: 2px;
      }
      #hp-text { font-size: 13px; color: #9AABB8; text-align: right; letter-spacing: 0.08em; }
      #tilt-indicator {
        flex: 1; display: flex; align-items: center; justify-content: center;
        font-size: 42px; letter-spacing: 0.12em; opacity: 0.18;
        pointer-events: none; color: #FFF4E0;
      }
      #boost {
        width: min(90vw, 360px); height: 120px; border-radius: 16px;
        background: #FF5A3C; border: none; color: #FFF4E0;
        font-size: 40px; font-family: Impact, "Arial Black", sans-serif;
        letter-spacing: 0.12em; cursor: pointer;
        transition: transform 0.05s, background 0.05s;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
        box-shadow: 0 6px 0 #B33B25;
      }
      #boost.active { transform: scale(0.96) translateY(3px); background: #FF7A5A; box-shadow: 0 3px 0 #B33B25; }
      #boost:disabled { background: #555B65; box-shadow: 0 6px 0 #2E3138; cursor: default; color: #888; }
      #start-overlay {
        position: fixed; inset: 0; background: #3A3F47;
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 24px; z-index: 100;
        cursor: pointer;
      }
      #start-overlay h1 { font-size: 30px; color: #FF5A3C; letter-spacing: 0.08em; }
      #start-overlay p { font-size: 16px; color: #9AABB8; text-align: center; max-width: 280px; font-family: sans-serif; }
      #start-overlay .tap-hint {
        font-size: 22px; color: #FFC83D; animation: pulse 1.5s ease-in-out infinite; letter-spacing: 0.1em;
      }
      #eliminated-overlay {
        position: fixed; inset: 0; background: rgba(58,63,71,0.94);
        display: none; flex-direction: column; align-items: center;
        justify-content: center; gap: 16px; z-index: 50;
      }
      #eliminated-overlay h2 { font-size: 52px; color: #FF5A3C; letter-spacing: 0.12em; }
      #eliminated-overlay p { font-size: 18px; color: #9AABB8; font-family: sans-serif; }
      @keyframes pulse { 0%,100% { opacity: 0.4 } 50% { opacity: 1 } }
    </style>
  </head>
  <body>
    <div id="start-overlay">
      <h1>DEMOLITION DERBY</h1>
      <p>Tilt your phone to steer. Tap BOOST to charge.</p>
      <div class="tap-hint">TAP TO START</div>
    </div>

    <div id="eliminated-overlay">
      <h2>ELIMINATED</h2>
      <p>Spectating… next round starting soon</p>
    </div>

    <div id="status"></div>
    <div id="round-info"></div>
    <div id="hp-wrap">
      <div id="hp-bar"><div id="hp-fill"></div></div>
      <div id="hp-text">HP 100</div>
    </div>
    <div id="tilt-indicator">TILT TO DRIVE</div>
    <button id="boost">BOOST</button>

    <script type="module" src="/src/controller.ts"></script>
  </body>
</html>
